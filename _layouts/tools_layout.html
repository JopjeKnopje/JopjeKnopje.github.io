layout: archive

<!-- based on the posts layout -->



{{ content }}

<!-- instead of calling the variable tools, we name it posts so we can use some of the already existing code in archive-single.html to handle the html templating -->
{% assign posts = site.tools %}
{% assign entries_layout = page.entries_layout | default: 'list' %}
<div class="entries-{{ entries_layout }}">
  {% for post in posts %}
  {% include archive-single.html type=entries_layout %}
  {% endfor %}
</div>
